# Render Blueprint — one-time: Dashboard → New → Blueprint → connect this repo.
# https://dashboard.render.com/select-repo?type=blueprint
#
# API keys: set XI_API_KEY_GLOBAL + XI_API_KEY_EU (or legacy XI_API_KEY for EU only).
# Render alone is enough — paste under the service → Environment.
# Optional: sync from GitHub Actions secrets (see .github/workflows/deploy-render.yml).

services:
  - type: web
    name: agents-test-mockup
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --no-audit --no-fund && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: XI_API_KEY_GLOBAL
        sync: false
      - key: XI_API_KEY_EU
        sync: false
      # Legacy EU fallback if XI_API_KEY_EU is unset
      - key: XI_API_KEY
        sync: false
