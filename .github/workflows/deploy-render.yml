# Deploy Express (static dist + /api/*) to Render.
#
# One-time setup (do once, then every push to main deploys):
# 1. Confirm repo secret: Settings → Secrets and variables → Actions → XI_API_KEY
# 2. Render.com → New → Blueprint → connect this GitHub repo (uses render.yaml)
#    When prompted, paste XI_API_KEY (same value as the GitHub secret).
# 3. After first deploy, copy Service ID from the service URL bar / Settings
#    (srv-…) and create Actions secrets:
#      RENDER_API_KEY   — Render Dashboard → Account Settings → API Keys
#      RENDER_SERVICE_ID — the srv-… id
# 4. Optional: RENDER_DEPLOY_HOOK — service → Settings → Deploy Hook (fallback trigger)
#
# With RENDER_API_KEY + RENDER_SERVICE_ID, this workflow syncs secrets.XI_API_KEY
# into Render env on every push, then triggers a deploy. Key never enters the client bundle.

name: Deploy to Render

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: render-deploy
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build (same-origin base /)
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Verify production entry is bundled
        run: |
          set -euo pipefail
          if grep -q '/src/main.js' dist/index.html; then
            echo "::error::dist/index.html still references /src/main.js"
            exit 1
          fi
          echo "OK: bundled index.html"

      - name: Ensure XI_API_KEY is not in client assets
        env:
          XI_API_KEY: ${{ secrets.XI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${XI_API_KEY}" ]; then
            echo "::error::GitHub Actions secret XI_API_KEY is empty. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          if grep -R --fixed-strings -n -- "${XI_API_KEY}" dist/; then
            echo "::error::XI_API_KEY leaked into dist/ — aborting."
            exit 1
          fi
          echo "OK: XI_API_KEY not present in dist/"

  sync-and-deploy:
    needs: build-and-verify
    runs-on: ubuntu-latest
    steps:
      - name: Sync XI_API_KEY to Render and deploy
        env:
          XI_API_KEY: ${{ secrets.XI_API_KEY }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          set -euo pipefail

          if [ -z "${XI_API_KEY}" ]; then
            echo "::error::XI_API_KEY secret missing"
            exit 1
          fi

          if [ -n "${RENDER_API_KEY}" ] && [ -n "${RENDER_SERVICE_ID}" ]; then
            echo "Syncing XI_API_KEY to Render service ${RENDER_SERVICE_ID}…"
            # GET existing vars, replace only XI_API_KEY, PUT merged list (PUT replaces all).
            EXISTING="$(curl -fsS \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json")"
            PAYLOAD="$(echo "$EXISTING" | jq --arg xi "$XI_API_KEY" '
              (map(.envVar // .) | map({key: .key, value: (.value // "")}) | map(select(.key != "XI_API_KEY")))
              + [{key: "XI_API_KEY", value: $xi}]
            ')"
            curl -fsS -X PUT \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" >/dev/null

            echo "Triggering Render deploy…"
            curl -fsS -X POST \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}'
            echo
            echo "Deploy requested. Public URL: https://<service-name>.onrender.com"
            exit 0
          fi

          if [ -n "${RENDER_DEPLOY_HOOK}" ]; then
            echo "RENDER_API_KEY/SERVICE_ID not set — triggering Deploy Hook only."
            echo "Ensure XI_API_KEY is already set in the Render dashboard Environment."
            curl -fsS -X POST "${RENDER_DEPLOY_HOOK}"
            echo
            exit 0
          fi

          echo "::notice::No RENDER_API_KEY+RENDER_SERVICE_ID or RENDER_DEPLOY_HOOK."
          echo "If the repo is connected via Render Blueprint, Render will auto-build from this push."
          echo "Confirm XI_API_KEY is set once in Render → Environment (same value as GitHub secret)."
          echo "Then open https://agents-test-mockup.onrender.com (or your custom service URL)."
