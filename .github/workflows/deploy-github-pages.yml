# OPTIONAL static-only fallback. Primary team site is Render (see deploy-render.yml).
# GitHub Pages cannot hold XI_API_KEY securely — /api/agent-config and /api/tts will not work here.
#
# Manual only (workflow_dispatch) so it does not compete with Render on every push to main.
# If you still want Pages: Settings → Pages → Source: GitHub Actions, then Run workflow.

name: Deploy static site to Pages (optional)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Compute Vite base path
        id: vite_base
        shell: bash
        run: |
          set -euo pipefail
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.vite_base.outputs.path }}
          VITE_PAGES_FORCE_WEBRTC: ${{ vars.VITE_PAGES_FORCE_WEBRTC }}
          VITE_BRANCH_ID: ${{ vars.VITE_BRANCH_ID }}
          # Optional: point Pages UI at a separate API host (e.g. Render URL with no trailing slash)
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build

      - name: Verify build is bundled (not raw /src/)
        run: |
          set -euo pipefail
          if grep -q '/src/main.js' dist/index.html; then
            echo "::error::dist/index.html still references /src/main.js — not a Vite production build."
            exit 1
          fi

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
